kind = "web"
previewPath = "/"
title = "BD E-Commerce Platform"
version = "1.0.0"
id = "artifacts/ecommerce"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18857

[services.development]
run = "pnpm --filter @workspace/ecommerce run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecommerce", "run", "build" ]
serve = "static"
publicDir = "artifacts/ecommerce/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18857"
BASE_PATH = "/"
